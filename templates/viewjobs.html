<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Jobs</title>
</head>
<body>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
    <header>
        <h1>All Jobs</h1>
    </header>
    <main>
        {% for i in job %}
            <div>
                <p>{{i[2]}}</p>
            </div>
            <form action="{{ url_for("jobs.deletejob") }}" method="POST">
                <input type="hidden" value="{{i[0]}}" name="job_id">
                <button type="submit">Delete Job</button>
            </form>
            <hr>
        {% endfor %}
        <br>
        <a href="/dashboard">
            <button type="submit">Dashboard</button>
        </a>
    </main>
</body>
</html>
