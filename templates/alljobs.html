<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs</title>
</head>
<body>
    <header>
        <h1>All Jobs</h1>
    </header>
    <main>
        {% for i in job %}
            <div>
                <p>{{i[2]}}</p>
                <br>
                <form action="/jobdetails" method="GET">
                    <input type="hidden" name="jobid" value="{{i[1]}}">
                    <input type="hidden" name="title" value="{{i[2]}}">
                <button type="submit">View Details</button>
                </form>     
            </div>
            <hr>
        {% endfor %}
        <a href="/dashboard">
            <button type="submit">Dashboard</button>
        </a>
    </main>
</body>
</html>
